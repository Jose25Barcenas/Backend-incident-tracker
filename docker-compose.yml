version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: incident-tracker-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: incident-tracker
    volumes:
      - mongodb_data:/data/db
    networks:
      - incident-network

volumes:
  mongodb_data:

networks:
  incident-network:
    driver: bridge
