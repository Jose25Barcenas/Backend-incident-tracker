version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: incident-tracker-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: incident-tracker
    volumes:
      - mongodb_data:/data/db
    networks:
      - incident-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: incident-tracker-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/incident-tracker
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - incident-network

volumes:
  mongodb_data:

networks:
  incident-network:
    driver: bridge
